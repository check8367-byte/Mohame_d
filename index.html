<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohamed Mahmoud | Profile</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* الـ CSS اللي بعته بالحرف */
        .music-btn {
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: 0.3s;
        }

        footer { margin-top: 50px; font-size; font-size: 11px; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="music-btn" id="musicBtn"><span>🔇</span></div>

    <div class="container">
        <img src="https://i.postimg.cc/nVNvqCxd/54c7d667a257a66718129902a14b90b3-(1).jpg" alt="Mohamed Mahmoud" class="profile-img">
        
        <h1>Mohamed Mahmoud</h1>
        <p class="welcome-text">Welcome To My World</p>

        <div class="links-container">
            <a href="https://t.me/Mohame_d0" class="link-card" target="_blank">My account</a>
            <a href="https://t.me/Ta3at_Allah_Life" class="link-card" target="_blank">My channel</a>
            <a href="https://wa.me/201272038295" class="link-card" target="_blank">WhatsApp</a>
            <a href="https://www.tiktok.com/@mohme_d6" class="link-card" target="_blank">TikTok</a>
            
            <a href="https://www.facebook.com/share/1aR3273mpV/" class="link-card" target="_blank">Facebook</a>
            
            <a href="https://91993905443298.sarhne.com" class="link-card" target="_blank">Sarhne</a>
        </div>

        <footer>Mohamed Mahmoud 2026 ©</footer>
    </div>

    <audio id="audio"></audio>

    <script>
        // الـ JavaScript اللي بعته بالحرف مع الرابط المطلوب
        const audio = document.getElementById("audio");
        const musicBtn = document.getElementById("musicBtn");
        const icon = musicBtn.querySelector("span");

        // الرابط اللي أنت اخترته
        const stream = "https://live.mp3quran.net:8006/;stream.mp3";

        let playing = false;

        // تجهيز الصوت مرة واحدة
        audio.src = stream;
        audio.volume = 0.7;
        audio.preload = "none";

        function playAudio() {
          audio.play()
            .then(() => {
              playing = true;
              icon.textContent = "🔊";
              musicBtn.classList.add("playing");
            })
            .catch((err) => {
              console.log("المتصفح منع التشغيل:", err);
            });
        }

        function pauseAudio() {
          audio.pause();
          playing = false;
          icon.textContent = "🔇";
          musicBtn.classList.remove("playing");
        }

        // زر التشغيل
        musicBtn.addEventListener("click", (e) => {
          e.stopPropagation();
          playing ? pauseAudio() : playAudio();
        });

        // أول تفاعل من المستخدم (حل مشكلة الموبايل)
        document.addEventListener("click", () => {
          if (!playing) playAudio();
        }, { once: true });

        // معالجة الأخطاء
        audio.addEventListener("error", () => {
          console.log("حصل خطأ في البث");
          pauseAudio();
        });

        audio.addEventListener("ended", () => {
          pauseAudio();
        });
    </script>
</body>
</html>
