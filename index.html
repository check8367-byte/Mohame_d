<audio id="audio"></audio>

<script>
    // بث إذاعة القرآن الكريم
    const audio = document.getElementById("audio");
    const musicBtn = document.getElementById("musicBtn");
    const icon = musicBtn.querySelector("span");

    const stream = "https://serverkw.quran-uni.com:8074/;*.mp3";

    let playing = false;

    audio.src = stream;
    audio.volume = 0.7;
    audio.preload = "auto";
    audio.crossOrigin = "anonymous";

    function playAudio() {
        audio.play()
            .then(() => {
                playing = true;
                icon.textContent = "🔊";
                musicBtn.classList.add("playing");
            })
            .catch((err) => {
                console.log("المتصفح منع التشغيل:", err);
            });
    }

    function pauseAudio() {
        audio.pause();
        playing = false;
        icon.textContent = "🔇";
        musicBtn.classList.remove("playing");
    }

    musicBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        playing ? pauseAudio() : playAudio();
    });

    audio.addEventListener("error", () => {
        console.log("حصل خطأ في البث");
        pauseAudio();
    });
</script>
